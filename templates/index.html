<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Quality Validator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 520px;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .upload-area {
            border: 2px dashed #bdc3c7;
            border-radius: 8px;
            padding: 40px 20px;
            margin-bottom: 24px;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .upload-area:hover {
            border-color: #2980b9;
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .upload-area label {
            cursor: pointer;
            display: block;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .upload-area p {
            color: #555;
            font-size: 14px;
            margin-top: 8px;
        }

        .file-name {
            font-size: 13px;
            color: #2980b9;
            margin-top: 10px;
            font-weight: bold;
        }

        .btn {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #1a252f;
        }

        .flash-messages {
            margin-bottom: 20px;
        }

        .flash-messages p {
            background: #e74c3c;
            color: white;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
        }

        .allowed {
            font-size: 12px;
            color: #aaa;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Data Quality Validator</h1>
        <p class="subtitle">Upload a CSV or Excel file to validate and generate a quality report.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-messages">
                    {% for message in messages %}
                        <p>{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" enctype="multipart/form-data">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <label>
                    <div class="upload-icon">📂</div>
                    <strong>Click to browse file</strong>
                    <p>Supported formats: CSV, Excel (.xlsx)</p>
                    <input type="file" id="fileInput" name="file" accept=".csv,.xlsx" onchange="showFileName(this)">
                    <div class="file-name" id="fileName"></div>
                </label>
            </div>

            <button type="submit" class="btn">Run Validation</button>
        </form>

        <p class="allowed">Only .csv and .xlsx files are accepted</p>
    </div>

    <script>
        function showFileName(input) {
            const label = document.getElementById("fileName");
            label.textContent = input.files[0] ? input.files[0].name : "";
        }
    </script>
</body>
</html>
